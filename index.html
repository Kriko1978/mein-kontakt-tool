<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt-CSV Generator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1c1e21; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85em; color: #4b4f56; }
        input, select { display: block; width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #dddfe2; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        button { background: #0084ff; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0073e6; }
        .footer-note { font-size: 0.75em; color: #90949c; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Kontakt erstellen</h2>
        
        <label>Name / Firma</label>
        <input type="text" id="title" placeholder="z.B. Max Mustermann">

        <label>E-Mail Adresse</label>
        <input type="email" id="email" placeholder="name@beispiel.de">

        <label>Nummer Typ</label>
        <select id="type">
            <option value="Privat">Privat</option>
            <option value="Geschäftlich">Geschäftlich</option>
            <option value="Mobil">Mobil</option>
        </select>

        <label>Telefonnummer</label>
        <input type="text" id="phone" placeholder="+49 123 456789">

        <label>Passwort (optional)</label>
        <input type="password" id="pass" placeholder="Passwort eingeben">

        <button onclick="saveToCSV()">CSV Datei speichern</button>
        
        <p class="footer-note">Info: Typ und Nummer werden im Notizfeld gespeichert.</p>
    </div>

    <script>
        function saveToCSV() {
            const title = document.getElementById('title').value || "Unbenannt";
            const email = document.getElementById('email').value;
            const type = document.getElementById('type').value;
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('pass').value;

            // CSV Header: Standard für Passwort-Apps
            const header = "Title,URL,Username,Password,Notes\n";
            
            // Wir kombinieren Typ und Nummer für das Notizfeld
            const notes = `Typ: ${type} | Tel: ${phone}`;
            
            // Zeile zusammenbauen (Anführungszeichen verhindern Fehler bei Kommas im Text)
            const row = `"${title}",,"${email}","${pass}","${notes}"`;

            const csvContent = header + row;

            // Datei-Download auslösen
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${title.replace(/\s+/g, '_')}_kontakt.csv`;
            link.click();
        }
    </script>
</body>
</html>
