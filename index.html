<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt-Manager Pro</title>
    <style>
        :root { --primary: #007aff; --success: #34c759; --danger: #ff3b30; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 12px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #1c1c1e; }
        label { display: block; margin-bottom: 4px; font-size: 0.8rem; font-weight: 600; color: #8e8e93; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #d1d1d6; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; }
        .btn:active { opacity: 0.7; }
        .btn-add { background: var(--primary); color: white; }
        .btn-save { background: var(--success); color: white; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.75rem; text-transform: uppercase; color: #8e8e93; padding: 8px 4px; }
        td { padding: 12px 4px; border-top: 1px solid #e5e5ea; font-size: 0.9rem; }
        .actions { display: flex; gap: 8px; }
        .action-btn { border: none; background: none; font-size: 1.1rem; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Kontakt hinzufügen</h2>
    <input type="hidden" id="edit-index" value="-1">
    
    <label>Name / Firma</label>
    <input type="text" id="title" placeholder="z.B. Max Mustermann">
    
    <label>E-Mail Adresse</label>
    <input type="email" id="email" placeholder="mail@beispiel.de">
    
    <label>Telefonnummer</label>
    <div style="display: flex; gap: 8px;">
        <select id="type" style="width: 120px;">
            <option>Privat</option>
            <option>Geschäft</option>
            <option>Mobil</option>
        </select>
        <input type="text" id="phone" placeholder="+49...">
    </div>
    
    <button class="btn btn-add" id="main-btn" onclick="addContact()">Hinzufügen</button>
</div>

<div class="card">
    <h2>Liste der Einträge</h2>
    <table id="contactTable">
        <thead>
            <tr>
                <th>Kontakt</th>
                <th>Info</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <button class="btn btn-save" onclick="exportCSV()">Als große CSV exportieren</button>
</div>

<script>
    let contacts = [];

    function addContact() {
        const title = document.getElementById('title').value;
        const email = document.getElementById('email').value;
        const type = document.getElementById('type').value;
        const phone = document.getElementById('phone').value;
        const editIdx = parseInt(document.getElementById('edit-index').value);

        if(!title) return alert("Bitte Namen eingeben!");

        const contactObj = { title, email, type, phone };

        if(editIdx > -1) {
            contacts[editIdx] = contactObj;
            document.getElementById('main-btn').innerText = "Hinzufügen";
            document.getElementById('edit-index').value = "-1";
        } else {
            contacts.push(contactObj);
        }

        resetFields();
        updateTable();
    }

    function updateTable() {
        const body = document.getElementById('tableBody');
        body.innerHTML = "";
        contacts.forEach((c, i) => {
            body.innerHTML += `<tr>
                <td><strong>${c.title}</strong><br><small>${c.email}</small></td>
                <td>${c.type}<br>${c.phone}</td>
                <td class="actions">
                    <button class="action-btn" onclick="editContact(${i})">✏️</button>
                    <button class="action-btn" onclick="deleteContact(${i})">🗑️</button>
                </td>
            </tr>`;
        });
    }

    function editContact(i) {
        const c = contacts[i];
        document.getElementById('title').value = c.title;
        document.getElementById('email').value = c.email;
        document.getElementById('type').value = c.type;
        document.getElementById('phone').value = c.phone;
        document.getElementById('edit-index').value = i;
        document.getElementById('main-btn').innerText = "Änderung speichern";
        window.scrollTo(0,0);
    }

    function deleteContact(i) {
        if(confirm("Löschen?")) {
            contacts.splice(i, 1);
            updateTable();
        }
    }

    function resetFields() {
        document.getElementById('title').value = "";
        document.getElementById('email').value = "";
        document.getElementById('phone').value = "";
    }

    function exportCSV() {
        if(contacts.length === 0) return alert("Liste ist leer!");
        
        let csv = "Title,URL,Username,Password,Notes\n";
        contacts.forEach(c => {
            const note = `${c.type}: ${c.phone}`;
            csv += `"${c.title}",,"${c.email}",,"${note}"\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "meine_kontakte.csv";
        a.click();
    }
</script>

</body>
</html>
